<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signaler un contenu leaké</title>
  <link rel="stylesheet" href="style.css" />
   <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <meta name="description" content="LeakWay est une plateforme sécurisée pour signaler les abus en ligne de manière anonyme et rapide. Protégez votre identité et aidez à lutter contre les contenus inappropriés." />
  <meta name="keywords" content="LeakWay, signalement, abus en ligne, anonyme, sécurité, plateforme de signalement" />
  <meta name="author" content="LeakWay Team" />
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png" />
<link rel="manifest" href="img/site.webmanifest" />
<link rel="shortcut icon" href="img/favicon.ico" />
</head>
<body>
  <div class="container">
    <h1>Signaler un contenu leaké</h1>
    <form id="leakForm">
      <label>Nom :</label>
      <input type="text" name="nom" required />

      <label>Email :</label>
      <input type="email" name="email" required />

      <label>Lien du contenu leaké :</label>
      <input type="url" name="lien" required />

      <label>Plateforme :</label>
      <select name="plateforme" required>
        <option value="">-- Choisir --</option>
        <option value="Coomer">Coomer</option>
        <option value="Kemono">Kemono</option>
        <option value="Autre">Autre</option>
      </select>

      <label>Commentaire (optionnel) :</label>
      <textarea name="commentaire" rows="4"></textarea>

      <button type="submit">Envoyer</button>
    </form>
    <p id="message"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
